<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rumbled</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — كل الألوان والمقاسات بتتوّرث من هنا بس.
     غيّر أي حاجة هنا وهتتطبق على الأداة كلها مرة واحدة، مفيش ألوان
     متكررة/مكتوبة يدويًا جوه أي قاعدة تانية في الملف ده.
     ============================================================ */
  :root{
    /* ثوابت مش بتتغير بين الثيمين */
    --radius-sm: 9px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-pill: 999px;
    --ease: cubic-bezier(.4,0,.2,1);
    --motion: 0.35s;
    --toast-bg: #14203e;
  }

  /* ---------- الثيم الغامق (Dark) — الافتراضي ---------- */
  :root, [data-theme="dark"]{
    --page-bg: #0a1730;
    --page-bg-glow: radial-gradient(1100px 560px at 15% -8%, #1c2f5c 0%, transparent 60%), radial-gradient(900px 500px at 100% 0%, #14264c 0%, transparent 55%), #0a1730;
    --panel: #122349;
    --panel-2: #17295a;
    --surface: #0e1d3d;
    --line: rgba(255,255,255,0.10);
    --text: #eef2fb;
    --text-dim: #93a1c4;
    --text-on-page: #b6c2e3;

    --blue: #5b8def;
    --blue-bg: rgba(91,141,239,0.16);
    --blue-border: rgba(91,141,239,0.4);

    --waiting: #f2685f;
    --waiting-bg: rgba(242,104,95,0.15);
    --waiting-border: rgba(242,104,95,0.4);
    --prog: #fbbf24;
    --prog-bg: rgba(251,191,36,0.15);
    --prog-border: rgba(251,191,36,0.4);
    --prog-text: #fcd34d;
    --done: #4ade80;
    --done-bg: rgba(74,222,128,0.15);
    --done-border: rgba(74,222,128,0.4);
    --done-text: #86efac;
    --purple: #c4b5fd;
    --purple-bg: rgba(196,181,253,0.16);
    --purple-border: rgba(196,181,253,0.4);

    --shadow-card: 0 4px 18px rgba(0,0,0,0.35);
    --shadow-card-hover: 0 10px 30px rgba(0,0,0,0.45);
    --shadow-btn: 0 8px 20px rgba(91,141,239,0.30);
    --shadow-popover: 0 14px 34px rgba(0,0,0,0.45);
    --scrollbar: rgba(255,255,255,0.16);
  }

  /* ---------- الثيم الفاتح (Light) ---------- */
  [data-theme="light"]{
    --page-bg: #eef1f7;
    --page-bg-glow: radial-gradient(1100px 560px at 15% -8%, #ffffff 0%, transparent 60%), radial-gradient(900px 500px at 100% 0%, #e4ecff 0%, transparent 55%), #eef1f7;
    --panel: #ffffff;
    --panel-2: #f6f8fc;
    --surface: #f3f5f9;
    --line: #dde2ec;
    --text: #1b2430;
    --text-dim: #6b7690;
    --text-on-page: #45516c;

    --blue: #2563eb;
    --blue-bg: #eaf0fe;
    --blue-border: #c7d9fd;

    --waiting: #dc2626;
    --waiting-bg: #fdeceb;
    --waiting-border: rgba(220,38,38,0.35);
    --prog: #d97706;
    --prog-bg: #fef3dd;
    --prog-border: rgba(217,119,6,0.35);
    --prog-text: #b45309;
    --done: #16a34a;
    --done-bg: #e8f9ee;
    --done-border: rgba(22,163,74,0.35);
    --done-text: #15803d;
    --purple: #7c3aed;
    --purple-bg: #f1e9fe;
    --purple-border: #ddc8fb;

    --shadow-card: 0 2px 12px rgba(20,30,50,0.08);
    --shadow-card-hover: 0 12px 28px rgba(20,30,50,0.14);
    --shadow-btn: 0 8px 20px rgba(37,99,235,0.25);
    --shadow-popover: 0 14px 30px rgba(20,30,50,0.16);
    --scrollbar: rgba(20,30,50,0.18);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--page-bg-glow);
    background-attachment: fixed;
    color: var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    transition: background-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  ::selection{ background: var(--blue); color:#fff; }

  header{
    background: var(--panel);
    border-bottom:1.5px solid var(--line);
    padding: 14px 20px;
    position: sticky; top:0; z-index: 30;
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease);
  }
  .header-inner{
    max-width: 1040px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  }
  @media (max-width: 640px){
    header{ padding: 12px 14px; position: static; } /* على الموبايل الهيدر بقى بيمشي مع الاسكرول، مش ثابت فوق طول الوقت */
    .header-inner{ gap:10px; }
    .brand h1{ font-size:15px; }
    .brand .sub{ display:none; } /* شرح الأدوار بيبقى طويل قوي للموبايل، مش أساسي هناك */
    .shift-badge{ font-size:11.5px; padding:7px 11px; order:3; width:100%; text-align:center; }
    .id-area{ order:2; }
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-dot{
    width:11px; height:11px; border-radius:50%; background:var(--blue);
    box-shadow: 0 0 0 0 rgba(91,141,239,0.6);
    animation: pulseDot 2.6s ease-in-out infinite;
  }
  @keyframes pulseDot{
    0%{ box-shadow: 0 0 0 0 rgba(91,141,239,0.45); }
    70%{ box-shadow: 0 0 0 8px rgba(91,141,239,0); }
    100%{ box-shadow: 0 0 0 0 rgba(91,141,239,0); }
  }
  .brand h1{
    font-size:16px; margin:0; font-weight:800;
    background: linear-gradient(90deg, var(--text) 40%, var(--blue) 120%);
    -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
  }
  .brand .sub{ font-size:11px; color:var(--text-dim); }

  .id-area{ display:flex; align-items:center; gap:8px; }

  /* ---------- مفتاح تبديل الثيم (Dark/Light) ---------- */
  .theme-toggle{
    position: relative; width:56px; height:32px; border-radius: var(--radius-pill);
    background: var(--surface); border:1.5px solid var(--line); cursor:pointer;
    padding:0; flex-shrink:0; transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease);
  }
  .theme-toggle .knob{
    position:absolute; top:2px; left:2px; width:24px; height:24px; border-radius:50%;
    background: var(--blue); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:13px; transition: transform var(--motion) var(--ease), background-color var(--motion) var(--ease);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }
  [data-theme="light"] .theme-toggle .knob{ transform: translateX(24px); background: #f59e0b; }

  .shift-badge{
    background: var(--purple-bg); border:1px solid var(--purple-border); color:var(--purple);
    padding:9px 14px; border-radius:10px; font-size:12.5px; font-weight:700;
    white-space:nowrap; transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }
  .id-area input{
    background: var(--surface); border:1.5px solid var(--line); color:var(--text);
    padding:11px 12px; border-radius:10px; font-size:14px; font-family:'IBM Plex Mono',monospace;
    text-transform:uppercase; letter-spacing:1px; width:130px; min-height:44px;
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }
  .id-area input:focus{ outline:none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
  .id-area button{
    background: var(--blue); color:#fff; border:none; padding:11px 16px;
    border-radius:10px; font-weight:700; font-size:12.5px; cursor:pointer; min-height:44px;
    transition: transform .15s var(--ease), box-shadow .15s var(--ease);
  }
  .id-chip{
    background: var(--blue-bg); border:1px solid var(--blue-border); color:var(--blue);
    padding:9px 14px; border-radius:10px; font-size:13px; font-weight:700;
    display:flex; align-items:center; gap:10px;
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }
  .id-chip .role{ color:var(--text-dim); font-weight:500; font-size:11.5px; }
  .id-chip button{ background:var(--waiting); border:none; color:#fff; font-size:11px; font-weight:800; cursor:pointer; text-decoration:none; padding:6px 12px; border-radius:8px; transition: transform .15s var(--ease); }
  .err{ color:var(--waiting); font-size:11.5px; margin-top:6px; }

  /* ---------- تفاعل بسيط (hover/press) على كل الأزرار — إحساس "حي" من غير مبالغة ---------- */
  button{ transition: transform .15s var(--ease), box-shadow .15s var(--ease), background-color var(--motion) var(--ease), opacity .15s var(--ease); }
  button:active{ transform: scale(0.96); }
  .new-btn:hover, .id-area button:hover, .vessel-add-row button:hover, .btn-send:hover{ filter:brightness(1.08); }

  .crane-picker-wrap{
    position:absolute; top:calc(100% + 8px); left:0;
    background:var(--panel); border:1.5px solid var(--line); border-radius:12px;
    padding:10px 10px 8px; box-shadow: var(--shadow-popover); z-index:40;
    max-width:260px; animation: pop .18s var(--ease);
  }
  .crane-picker-label{ font-size:10.5px; color:var(--text-dim); font-weight:700; margin-bottom:7px; white-space:nowrap; }
  .crane-picker{ display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; max-width:240px; }
  .crane-picker::-webkit-scrollbar{ height:5px; }
  .crane-picker::-webkit-scrollbar-thumb{ background:var(--line); border-radius:10px; }
  .crane-chip{
    flex-shrink:0; background:var(--surface); border:1.5px solid var(--line); color:var(--text);
    padding:8px 12px; border-radius:10px; font-size:12.5px; font-weight:800; cursor:pointer;
    font-family:'IBM Plex Mono',monospace; transition: background-color .15s var(--ease), transform .15s var(--ease);
  }
  .crane-chip:hover{ transform: translateY(-1px); }
  .crane-chip.active{ background:var(--blue); border-color:var(--blue); color:#fff; }

  main{ max-width: 1040px; margin: 0 auto; padding: 20px 20px 60px; }

  .toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .toolbar h2{ font-size:14px; margin:0; color:var(--text-on-page); font-weight:700; }
  .new-btn{
    position:relative; overflow:hidden;
    background: var(--blue); color:#fff; border:none; padding:12px 18px;
    border-radius:12px; font-weight:700; font-size:13px; cursor:pointer;
    display:flex; align-items:center; gap:6px; box-shadow: var(--shadow-btn);
    min-height:44px;
  }
  .new-btn:hover{ transform: translateY(-1px); box-shadow: 0 12px 26px rgba(91,141,239,0.35); }
  /* لمعة خفيفة بتعدي على الزرار الأساسي لما تحوم عليه — لمسة "خرافية" بسيطة من غير مبالغة */
  .new-btn::after{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-20deg); transition: left .5s var(--ease);
  }
  .new-btn:hover::after{ left:130%; }

  .empty{ text-align:center; color:var(--text-on-page); padding:70px 20px; font-size:13.5px; line-height:1.9; }

  .grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:14px;
  }
  .card{
    background: var(--panel); border-radius:18px; padding:16px;
    box-shadow: var(--shadow-card);
    border:1.5px solid var(--line);
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), box-shadow .2s var(--ease), transform .2s var(--ease);
  }
  .card:hover{ transform: translateY(-3px); box-shadow: var(--shadow-card-hover); }
  /* الأنيميشن بيتحط بس على الكروت الجديدة فعلًا (مش على كل الكروت في كل رندر) — ده اللي كان بيسبب "الرعشة" */
  .card.new-card{ animation: pop .32s var(--ease); }
  @keyframes pop{ from{opacity:0; transform:translateY(10px) scale(.98);} to{opacity:1; transform:translateY(0) scale(1);} }
  .card.st-waiting{ background: var(--waiting-bg); border-color: var(--waiting-border); }
  .card.st-inprogress{ background: var(--prog-bg); border-color: var(--prog-border); }
  .card.st-done{ background: var(--done-bg); border-color: var(--done-border); }
  .card.st-wrongdata{ background: var(--waiting-bg); border-color: var(--waiting); }
  .st-wrongdata .badge{ background: var(--waiting); }

  .card-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .badge{
    padding:4px 11px; border-radius:999px; font-size:10.5px; font-weight:800; color:#fff;
  }
  .st-waiting .badge{ background: var(--waiting); }
  .st-inprogress .badge{ background: var(--prog); }
  .st-done .badge{ background: var(--done); }
  .time{ font-size:10.5px; color:var(--text-dim); }

  .container-no{ font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:18px; margin-bottom:2px; color:var(--text); }
  .route{ font-size:11px; color:var(--text-dim); margin-bottom:10px; }

  .info-row{ display:flex; font-size:12.5px; padding:3px 0; }
  .info-row .k{ width:110px; color:var(--text-dim); flex-shrink:0; }
  .info-row .v{ font-weight:600; color:var(--text); }

  .card-actions{ margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .card-actions button{
    flex:1; border:none; padding:12px 10px; border-radius:10px; font-weight:700; font-size:12.5px; cursor:pointer; color:#fff;
    min-width:80px; min-height:44px;
  }
  .card-actions button:hover{ filter:brightness(1.08); transform: translateY(-1px); }
  .btn-start{ background: var(--prog); }
  .btn-done{ background: var(--done); }
  .btn-del{ background: var(--waiting); }

  .poa-field{ margin-top:10px; }
  .poa-field label{ display:block; font-size:11px; color:var(--text-dim); margin-bottom:5px; font-weight:700; }
  .poa-field input{
    width:100%; background: var(--surface); border:1.5px solid var(--line); color:var(--text);
    padding:9px 10px; border-radius:9px; font-size:13px; font-family:'IBM Plex Mono',monospace;
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }
  .poa-field input:focus{ outline:none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }

  .wrong-check-group{ margin-top:10px; padding:9px 10px; background: var(--waiting-bg); border:1.5px solid var(--waiting-border); border-radius:9px; }
  .wrong-check{ display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700; color:var(--waiting); cursor:pointer; padding:3px 0; }
  .wrong-check input{ width:16px; height:16px; accent-color: var(--waiting); cursor:pointer; }

  /* modal */
  .modal-bg{
    position:fixed; inset:0; background:rgba(6,10,20,0.55);
    display:flex; align-items:center; justify-content:center; z-index:60; padding:16px;
    animation: fadeIn .2s var(--ease);
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .modal{
    background: var(--panel); border-radius:18px; width:100%; max-width:420px;
    padding:22px; animation: pop .22s var(--ease); border:1.5px solid var(--line);
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-popover);
  }
  .modal h3{ margin:0 0 16px; font-size:15px; color:var(--text); }
  .field{ margin-bottom:13px; }
  .field label{ display:block; font-size:11.5px; color:var(--text-dim); margin-bottom:6px; font-weight:700; }
  .field input, .field select{
    width:100%; background: var(--surface); border:1.5px solid var(--line); color:var(--text);
    padding:11px 12px; border-radius:10px; font-size:13.5px; font-family:inherit;
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }
  .field input:focus, .field select:focus{ outline:none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-bg); }
  .field input.mono, .field select{ font-family:'IBM Plex Mono',monospace; }
  .modal-actions{ display:flex; gap:8px; margin-top:6px; }
  .modal-actions button{ flex:1; padding:13px; border-radius:10px; font-weight:700; font-size:13.5px; cursor:pointer; border:none; min-height:44px; }
  .btn-cancel{ background: var(--surface); color:var(--text-dim); border:1.5px solid var(--line) !important; }
  .btn-send{ background: var(--blue); color:#fff; }

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-8px);
    background: var(--toast-bg); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:12.5px; z-index:99; font-weight:600; opacity:0; pointer-events:none;
    transition:opacity .25s var(--ease), transform .25s var(--ease);
    box-shadow: 0 10px 24px rgba(0,0,0,0.3);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .role-note{
    background: var(--purple-bg); color:var(--purple); border:1px solid var(--purple-border);
    padding:10px 14px; border-radius:12px; font-size:12px; font-weight:600; margin-bottom:16px;
    transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease), color var(--motion) var(--ease);
  }

  .vessel-manager{ background:var(--panel); border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:16px; transition: background-color var(--motion) var(--ease), border-color var(--motion) var(--ease); }
  .vessel-manager-label{ font-size:11px; color:var(--text-dim); font-weight:700; margin-bottom:8px; }
  .vessel-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .vessel-chip{ display:flex; align-items:center; gap:6px; background:var(--surface); border:1.5px solid var(--line); color:var(--text); padding:9px 14px; border-radius:999px; font-size:12.5px; font-weight:700; cursor:pointer; transition: background-color .15s var(--ease), transform .15s var(--ease); }
  .vessel-chip:hover{ transform: translateY(-1px); }
  .vessel-chip.active{ background:var(--blue); border-color:var(--blue); color:#fff; }
  .vessel-add-row{ display:flex; gap:8px; }
  .vessel-add-row input{ flex:1; background:var(--surface); border:1.5px solid var(--line); color:var(--text); padding:10px; border-radius:9px; font-size:13px; min-height:44px; }
  .vessel-add-row button{ background:var(--blue); color:#fff; border:none; padding:10px 16px; border-radius:9px; font-weight:700; font-size:12.5px; cursor:pointer; white-space:nowrap; min-height:44px; }
  .vessel-remove-row{ display:flex; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--line); }
  .vessel-remove-row select{ flex:1; background:var(--surface); border:1.5px solid var(--line); color:var(--text); padding:10px; border-radius:9px; font-size:13px; min-height:44px; }
  .vessel-remove-row button{ background:var(--waiting); color:#fff; border:none; padding:10px 16px; border-radius:9px; font-weight:700; font-size:12.5px; cursor:pointer; white-space:nowrap; min-height:44px; }

  .filter-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-tab{
    background: var(--panel); border:1.5px solid var(--line); color:var(--text-dim);
    padding:10px 14px; border-radius:999px; font-size:12.5px; font-weight:700; cursor:pointer; min-height:40px;
    transition: background-color .15s var(--ease), border-color .15s var(--ease), color .15s var(--ease), transform .15s var(--ease), opacity .15s var(--ease);
  }
  .filter-tab:hover{ transform: translateY(-1px); }
  .filter-tab.active{ background: var(--blue); border-color:var(--blue); color:#fff; }

  /* ألوان صافية (مش تظليل خفيف) لتابات Waiting/In Progress/Done — التاب النشط بيتميز بحلقة بيضا حواليه */
  .filter-tab.tab-waiting{ background: var(--waiting); border-color: var(--waiting); color:#fff; opacity:0.8; }
  .filter-tab.tab-inprogress{ background: var(--prog); border-color: var(--prog); color:#fff; opacity:0.8; }
  .filter-tab.tab-done{ background: var(--done); border-color: var(--done); color:#fff; opacity:0.8; }
  .filter-tab.tab-waiting.active{ opacity:1; box-shadow: 0 0 0 3px rgba(255,255,255,0.65) inset; }
  .filter-tab.tab-inprogress.active{ opacity:1; box-shadow: 0 0 0 3px rgba(255,255,255,0.65) inset; }
  .filter-tab.tab-done.active{ opacity:1; box-shadow: 0 0 0 3px rgba(255,255,255,0.65) inset; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">

<script>
/* ---------- Firebase config — بتاعة مشروع dact---rumbled ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyAN5-MxcKydrNwpyUrlNLqZucQt8Z51DcE",
  authDomain: "dact---rumbled.firebaseapp.com",
  projectId: "dact---rumbled",

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// كل تاسك بقى مستند مستقل جوه الكوليكشن ده (بدل ما كانوا كلهم جوه Array واحد في مستند واحد) — ده اللي بيقلل استهلاك القراءات
const tasksCol = db.collection('tasks');
const historyCol = db.collection('history');
const vesselsDocRef = db.collection('opsBoard').doc('vessels'); // ده فضل زي ما هو — مش كبير ومش بيتغيّر كتير، مش هو مصدر الاستهلاك

const TASKS_KEY = 'ops-board:tasks'; // مش مستخدمة كمفتاح تخزين تاني، سايبينها للتوثيق بس
const HISTORY_KEY = 'ops-board:history';
const ID_KEY = 'ops-board:my-id'; // ده تفضيل شخصي للجهاز — localStorage عادي مناسبة هنا لأننا خرجنا برة Claude Artifact
const PENDING_CRANE_KEY = 'ops-board:pending-crane';
const MY_VESSEL_KEY = 'ops-board:my-vessel'; // آخر مركب اختاره الشخص من على الجهاز ده — بيفتكره لحد ما يغيّره بنفسه
const THEME_KEY = 'ops-board:theme'; // dark أو light — بيفتكر اختيار الشخص على الجهاز ده

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  const knob = document.getElementById('themeKnob');
  if(knob) knob.textContent = theme === 'light' ? '☀️' : '🌙';
  localStorage.setItem(THEME_KEY, theme);
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}
function loadTheme(){
  applyTheme(localStorage.getItem(THEME_KEY) || 'dark'); // الافتراضي غامق
}

// PIN زرار "Reset Database" — غيّره هنا لأي رقم تحبه وارفع نسخة جديدة على GitHub، ده كل اللي محتاجه
const RESET_PIN = '4821';

let myId = null, myRole = null;
let tasks = []; // مستخدمة لـ W (تاسكاته هو بس) ولـ M/V (كل التاسكات) — كل واحد بيسمع كويري مختلفة
let dWaiting = [];      // D بس: التاسكات الـ Waiting المتاحة يشتغل عليها
let dMyInProgress = []; // D بس: التاسكات اللي هو بدأها ولسه In Progress
let historyLog = []; // نسخة دائمة من كل تاسك اتعمل — بتفضل موجودة حتى لو التاسك اتحذف — M بس اللي بيسمعها كاملة
let vessels = []; // قائمة المراكب الشغالة دلوقتي — مشتركة بين الكل، D بس يقدر يضيف/يشيل منها
let myVessel = null; // المركب المختار حاليًا على الجهاز ده (لـ W وقت الإرسال، ولـ D وقت الفلترة)
let wFilter = 'all'; // الفلتر النشط في شاشة W: all / waiting / inprogress / done
let mvFilter = 'all'; // نفس فكرة wFilter بس لشاشة M و V: all / waiting / inprogress / done
let seenCardIds = new Set(); // كل كارت (id) اتعرض قبل كده — عشان الأنيميشن (pop) يشتغل مرة واحدة بس وقت ظهور الكارت لأول مرة، مش في كل رندر
let preselectedCrane = null; // الكرين اللي اختاره الـ W قبل ما يدخل — بيتكتب تلقائي في أول تاسك
let isModalOpen = false; // بنأجل الـ re-render وقت ما مودال مفتوح عشان منقفلوش في وشه
let firestoreReady = false; // بيبقى true لما أول snapshot يوصل من الاتنين

const idArea = document.getElementById('idArea');
const mainArea = document.getElementById('mainArea');
const toastEl = document.getElementById('toast');

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=> toastEl.classList.remove('show'), 1700);
}

function validId(v){ return /^[WDMV]\d{4}$/.test(v.toUpperCase()); }
function fmtTime(ts){ return ts ? new Date(ts).toLocaleString('en-GB', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '—'; }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent = s==null ? '' : s; return d.innerHTML; }
function statusLabel(s){ return s==='done' ? 'Done' : s==='inprogress' ? 'In Progress' : 'Waiting'; }
// بيرجع ' new-card' مرة واحدة بس أول ما الكارت ده يظهر (عشان الأنيميشن ميتكررش على كل الكروت في كل رندر — ده كان سبب "الرعشة")
function cardAnimClass(id){
  if(seenCardIds.has(id)) return '';
  seenCardIds.add(id);
  return ' new-card';
}

/* ---------- الشيفت الحالي: Day 7ص-3م / Evening 3م-11م / Night 11م-7ص ---------- */
// بتاخد أي وقت (timestamp) وترجع اسم الشيفت + تاريخ بداية الشيفت (كـ timestamp) — مستخدمة للبادچ الحي ولتاجّ كل تاسك وقت إنشاءه
function getShiftInfoForTimestamp(ts){
  const d = new Date(ts);
  const h = d.getHours();
  let name;
  const shiftDate = new Date(d);
  if(h >= 7 && h < 15){ name = 'Day'; }
  else if(h >= 15 && h < 23){ name = 'Evening'; }
  else{
    name = 'Night';
    if(h < 7){ shiftDate.setDate(shiftDate.getDate() - 1); } // الشيفت بدأ بالليل اللي فات
  }
  return { name, shiftDateTs: shiftDate.getTime() };
}
function getCurrentShiftInfo(){ return getShiftInfoForTimestamp(Date.now()); }
function renderShiftBadge(){
  const el = document.getElementById('shiftBadge');
  if(!el) return;
  const s = getCurrentShiftInfo();
  const dateLabel = new Date(s.shiftDateTs).toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit'});
  el.textContent = `${s.name} Shift — ${dateLabel}`;
}

/* ---------- Firestore persistence — كل تاسك بيتقرا/يتكتب كمستند مستقل بدل ما يكون جوه Array واحد ---------- */
async function writeTaskDoc(id, data){
  try{ await tasksCol.doc(id).set(data); }
  catch(e){ toast('Save failed — check your internet connection'); throw e; }
}
async function updateTaskDoc(id, patch){
  try{ await tasksCol.doc(id).update(patch); }
  catch(e){ toast('Save failed — check your internet connection'); throw e; }
}
async function deleteTaskDoc(id){
  try{ await tasksCol.doc(id).delete(); }
  catch(e){ toast('Delete failed — check your internet connection'); throw e; }
}
async function writeHistoryDoc(id, data){
  try{ await historyCol.doc(id).set(data, {merge:true}); }
  catch(e){ toast('Failed to save History'); throw e; }
}

/* ---------- Real-time listeners: بيحدّثوا الشاشة تلقائي لحظة أي حد تاني يعدّل ---------- */
let renderDebounceTimer = null;
// بنجمع أي كذا تحديث سريع من الـ listeners (زي tasks+history مع بعض) في رندر واحد بس عشان الشاشة متهزّش
function scheduleRender(){
  if(!myId || isModalOpen) return;
  clearTimeout(renderDebounceTimer);
  renderDebounceTimer = setTimeout(render, 150); // كانت 60ms — رفعناها شوية عشان تجمع تحديثات tasks+history+vessels اللي بتوصل من الشبكة مش في نفس اللحظة بالظبط، في رندر واحد بس
}

function attachVesselsListener(){
  vesselsDocRef.onSnapshot(snap=>{
    const data = snap.exists ? snap.data() : null;
    vessels = (data && data.list) || [];
    scheduleRender();
  }, err=>{});
}

// كل الـ unsubscribe functions النشطة حاليًا لكويريهات التاسكات — بنقفلهم عند الـ logout أو قبل ما نفتح كويري جديدة
let unsubTasks = [];
let unsubHistory = null;

function detachTaskListeners(){
  unsubTasks.forEach(u=>{ try{ u(); }catch(e){} });
  unsubTasks = [];
  if(unsubHistory){ try{ unsubHistory(); }catch(e){} unsubHistory = null; }
  tasks = []; historyLog = []; dWaiting = []; dMyInProgress = [];
  firestoreReady = false;
}

// كل دور بيسمع بس الكويري اللي فعلاً محتاجها — مش كل التاسكات زي الأول، وده اللي بيقلل استهلاك القراءات فعليًا
// (فلترة wrongData/status في الفرونت-إند هنا عشان نتجنب احتياج Composite Index في Firestore)
function attachTaskListenersForRole(){
  detachTaskListeners();

  if(myRole === 'W'){
    const u = tasksCol.where('from', '==', myId).onSnapshot(snap=>{
      tasks = snap.docs.map(d=> d.data());
      firestoreReady = true;
      scheduleRender();
    }, err=>{ toast('Database connection error'); });
    unsubTasks.push(u);

  }else if(myRole === 'D'){
    const u1 = tasksCol.where('status', '==', 'waiting').onSnapshot(snap=>{
      dWaiting = snap.docs.map(d=> d.data()).filter(t=> !t.wrongData);
      firestoreReady = true;
      scheduleRender();
    }, err=>{ toast('Database connection error'); });
    const u2 = tasksCol.where('startedBy', '==', myId).onSnapshot(snap=>{
      dMyInProgress = snap.docs.map(d=> d.data()).filter(t=> t.status === 'inprogress');
      firestoreReady = true;
      scheduleRender();
    }, err=>{});
    unsubTasks.push(u1, u2);

  }else{ // M و V — لازم يشوفوا كل التاسكات
    const u = tasksCol.onSnapshot(snap=>{
      tasks = snap.docs.map(d=> d.data());
      firestoreReady = true;
      scheduleRender();
    }, err=>{ toast('Database connection error'); });
    unsubTasks.push(u);
  }

  if(myRole === 'M'){ // الأرشيف الكامل (History) — M بس محتاجها فعليًا (للتصدير وشاشة الأرشيف)
    unsubHistory = historyCol.onSnapshot(snap=>{
      historyLog = snap.docs.map(d=> d.data());
      scheduleRender();
    }, err=>{});
  }
}

/* ---------- المراكب: D بس يقدر يضيف/يشيل، W وD بيختاروا مركب واحد يتفتكر ليهم على الجهاز ---------- */
const ALL_VESSELS = '__ALL__'; // قيمة خاصة معناها "كل المراكب مع بعض" — مش اسم مركب حقيقي
// بيرجع true لو التاسك ده لازم يظهر مع الفلتر الحالي (نفس المنطق اللي كان مستخدم جوه D بس، دلوقتي مشترك لكل الأدوار)
function vesselMatches(t){
  return vessels.length < 2 || myVessel === ALL_VESSELS || !t.vessel || t.vessel === myVessel;
}
function loadMyVessel(){
  try{ myVessel = localStorage.getItem(MY_VESSEL_KEY) || ALL_VESSELS; }catch(e){ myVessel = ALL_VESSELS; }
}
function saveMyVessel(name){
  myVessel = name;
  try{ localStorage.setItem(MY_VESSEL_KEY, name); }catch(e){}
}
async function persistVessels(){
  try{ await vesselsDocRef.set({ list: vessels, updatedAt: Date.now() }); }
  catch(e){ toast('Failed to save vessel list — check your connection'); }
}
async function addVessel(name){
  name = (name||'').trim();
  if(!name){ toast('Enter a vessel name first'); return; }
  if(vessels.includes(name)){ toast('This vessel is already in the list'); return; }
  vessels.push(name);
  await persistVessels();
  saveMyVessel(name);
  render();
  toast('Vessel added ✓');
}
async function removeVessel(name){
  if(!confirm('Remove vessel "' + name + '" from the list?')) return;
  vessels = vessels.filter(v=>v!==name);
  await persistVessels();
  if(myVessel === name){ saveMyVessel(ALL_VESSELS); }
  render();
  toast('Vessel removed ✓');
}

/* ---------- تسجيل الدخول: ده تفضيل شخصي للجهاز، مش بيانات مشتركة — فضلنا على localStorage ---------- */
function loadId(){
  try{
    const v = localStorage.getItem(ID_KEY);
    if(v && validId(v)){ myId = v.toUpperCase(); myRole = myId[0]; }
    const pc = localStorage.getItem(PENDING_CRANE_KEY);
    if(pc) preselectedCrane = pc;
  }catch(e){}
  renderIdArea();
}
function saveId(v){
  const val = v.trim().toUpperCase();
  if(!validId(val)){ renderIdArea('Must start with W, D, M or V followed by 4 digits, e.g. W1201'); return; }
  if(val[0] === 'W' && !preselectedCrane){ renderIdArea('You must select a crane number before logging in'); return; }
  myId = val; myRole = val[0];
  try{ localStorage.setItem(ID_KEY, myId); }catch(e){}
  renderIdArea();
  mainArea.innerHTML = `<div class="empty">Connecting to the database...</div>`;
  attachTaskListenersForRole();
}

function roleLabel(r){
  return { W:'D&W — creates tasks', D:'Duty — receives, executes & verifies data', M:'Monitor — full access', V:'Viewer — view only' }[r] || '';
}

function renderIdArea(errorMsg){
  if(myId){
    idArea.innerHTML = `
      <div class="id-chip">
        <span class="mono">${myId}</span>
        <span class="role">${roleLabel(myRole)}</span>
        <button id="logoutBtn">Logout</button>
      </div>`;
    document.getElementById('logoutBtn').onclick = ()=>{ detachTaskListeners(); myId=null; myRole=null; renderIdArea(); render(); };
  }else{
    idArea.innerHTML = `
      <div style="position:relative; display:flex; align-items:center; gap:8px;">
        <input id="idInput" class="mono" placeholder="W1201" maxlength="5" />
        <button id="loginBtn">Login</button>
        ${errorMsg ? `<div class="err">${errorMsg}</div>` : ''}
        <div id="cranePickerWrap" class="crane-picker-wrap" style="display:none;">
          <div class="crane-picker-label">Crane number — auto-filled in your first task</div>
          <div class="crane-picker" id="cranePicker"></div>
        </div>
      </div>
    `;
    const idInputEl = document.getElementById('idInput');
    document.getElementById('loginBtn').onclick = ()=> saveId(idInputEl.value);
    idInputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
    idInputEl.addEventListener('input', ()=> toggleCranePicker(idInputEl.value));
    toggleCranePicker(idInputEl.value); // لو فيه قيمة محفوظة في الحقل فعلاً تبدأ بـ W
  }
}

function toggleCranePicker(val){
  const wrap = document.getElementById('cranePickerWrap');
  if(!wrap) return;
  if((val||'').trim().toUpperCase().startsWith('W')){
    wrap.style.display = 'block';
    renderCranePicker();
  }else{
    wrap.style.display = 'none';
  }
}

function renderCranePicker(){
  const picker = document.getElementById('cranePicker');
  if(!picker) return;
  picker.innerHTML = ['1','2','3','4','5','6','7'].map(c=>
    `<button type="button" class="crane-chip${preselectedCrane===c ? ' active' : ''}" data-crane-pick="${c}">C${c.padStart(2,'0')}</button>`
  ).join('');
  picker.querySelectorAll('[data-crane-pick]').forEach(btn=>{
    btn.onclick = ()=>{
      preselectedCrane = btn.dataset.cranePick;
      try{ localStorage.setItem(PENDING_CRANE_KEY, preselectedCrane); }catch(e){}
      renderCranePicker();
      toast('Crane C' + preselectedCrane.padStart(2,'0') + ' will auto-fill in your next task');
    };
  });
}

/* ---------- Rendering ---------- */
function render(){
  if(!myId){
    mainArea.innerHTML = `<div class="empty">Enter your ID above to access the board<br><span style="font-size:11.5px;">W#### / D#### / M#### / V####</span></div>`;
    return;
  }

  // بنحفظ أي حقل input كان الشخص بيكتب فيه (زي Position on Arrival) قبل ما نعيد بناء الشاشة كلها،
  // عشان لو حد تاني عمل أكشن في نفس اللحظة (وده بيحصل عن طريق الـ real-time listeners) الكتابة متتمسحش وميحصلش "قفزة" محسوسة
  const active = document.activeElement;
  let focusSnapshot = null;
  if(active && mainArea.contains(active) && active.id){
    focusSnapshot = { id: active.id, value: active.value, selStart: active.selectionStart, selEnd: active.selectionEnd };
  }

  if(myRole === 'W') mainArea.innerHTML = renderWView();
  else if(myRole === 'D') mainArea.innerHTML = renderDView();
  else mainArea.innerHTML = renderMVView(); // M و V بنفس الشاشة، الفرق في الأزرار بس

  const newBtn = document.getElementById('newTaskBtn');
  if(newBtn) newBtn.onclick = openNewTaskModal;

  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick = exportHistoryCsv;

  const deleteAllBtn = document.getElementById('deleteAllBtn');
  if(deleteAllBtn) deleteAllBtn.onclick = ()=> deleteAllTasksInView(wFilter);

  const deleteAllMvBtn = document.getElementById('deleteAllMvBtn');
  if(deleteAllMvBtn) deleteAllMvBtn.onclick = ()=> deleteAllTasksInMVView(mvFilter);

  const resetDbBtn = document.getElementById('resetDbBtn');
  if(resetDbBtn) resetDbBtn.onclick = openResetDbModal;

  mainArea.querySelectorAll('[data-wfilter]').forEach(btn=>{
    btn.onclick = ()=>{ wFilter = btn.dataset.wfilter; render(); };
  });
  mainArea.querySelectorAll('[data-mvfilter]').forEach(btn=>{
    btn.onclick = ()=>{ mvFilter = btn.dataset.mvfilter; render(); };
  });

  mainArea.querySelectorAll('[data-start]').forEach(btn=>{
    btn.onclick = ()=> startTask(btn.dataset.start);
  });
  mainArea.querySelectorAll('[data-fixcontainer]').forEach(btn=>{
    btn.onclick = ()=> fixContainerNumber(btn.dataset.fixcontainer);
  });
  mainArea.querySelectorAll('[data-done]').forEach(btn=>{
    btn.onclick = ()=> doneTask(btn.dataset.done);
  });
  mainArea.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=> deleteTask(btn.dataset.del);
  });
  mainArea.querySelectorAll('[data-wrong]').forEach(btn=>{
    btn.onclick = ()=> sendWrongData(btn.dataset.wrong);
  });
  mainArea.querySelectorAll('[data-resend]').forEach(btn=>{
    btn.onclick = ()=> resendTask(btn.dataset.resend);
  });

  mainArea.querySelectorAll('[data-vessel-select]').forEach(chip=>{
    chip.onclick = ()=>{ saveMyVessel(chip.dataset.vesselSelect); render(); };
  });
  const addVesselBtn = document.getElementById('addVesselBtn');
  if(addVesselBtn){
    const newVesselInput = document.getElementById('newVesselInput');
    addVesselBtn.onclick = ()=>{ addVessel(newVesselInput.value); newVesselInput.value=''; };
    newVesselInput.addEventListener('keydown', e=>{ if(e.key==='Enter') addVesselBtn.click(); });
  }
  const removeVesselBtn = document.getElementById('removeVesselBtn');
  if(removeVesselBtn){
    const removeVesselSelect = document.getElementById('removeVesselSelect');
    removeVesselBtn.onclick = ()=> removeVessel(removeVesselSelect.value);
  }

  // بعد إعادة البناء، لو كان فيه حقل الشخص بيكتب فيه، نرجّعله نفس القيمة ومكان المؤشر بالظبط
  if(focusSnapshot){
    const el = document.getElementById(focusSnapshot.id);
    if(el){
      el.value = focusSnapshot.value;
      el.focus();
      if(typeof el.setSelectionRange === 'function'){
        try{ el.setSelectionRange(focusSnapshot.selStart, focusSnapshot.selEnd); }catch(e){}
      }
    }
  }
}

function baseCard(t, opts){
  opts = opts || {};
  const isWrong = !!t.wrongData;
  const cardClass = isWrong ? 'wrongdata' : t.status;
  const badgeText = isWrong ? 'Waiting Edit' : statusLabel(t.status);
  return `
    <div class="card st-${cardClass}${cardAnimClass(t.id)}">
      <div class="card-top">
        <span class="badge">${badgeText}</span>
        <span class="time">${fmtTime(t.createdAt)}</span>
      </div>
      <div class="container-no">${escapeHtml(t.container)}</div>
      <div class="route">From: ${escapeHtml(t.from)}${t.startedBy ? ' → ' + escapeHtml(t.startedBy) : ''}</div>
      ${t.vessel ? `<div class="info-row"><span class="k">Vessel</span><span class="v">${escapeHtml(t.vessel)}</span></div>` : ''}
      <div class="info-row"><span class="k">Position</span><span class="v">${escapeHtml(t.position||'—')}</span></div>
      <div class="info-row"><span class="k">Crane</span><span class="v">${escapeHtml(t.crane||'—')}</span></div>
      <div class="info-row"><span class="k">Truck</span><span class="v">${escapeHtml(t.truck||'—')}</span></div>
      <div class="info-row"><span class="k">Position on Arrival</span><span class="v">${escapeHtml(t.positionOnArrival||'—')}</span></div>
      ${isWrong ? `<div class="info-row"><span class="k">Rejected by</span><span class="v" style="color:var(--waiting)">${escapeHtml(t.wrongBy)} — ${fmtTime(t.wrongAt)}</span></div>` : ''}
      ${opts.extra || ''}
    </div>`;
}

function renderWView(){
  const allMine = tasks.filter(vesselMatches); // tasks هنا أصلًا مفلترة من Firestore على تاسكات W نفسه بس
  const labels = {all:'All', waiting:'Waiting', inprogress:'In Progress', done:'Done'};
  const counts = {
    all: allMine.length,
    waiting: allMine.filter(t=>t.status==='waiting').length,
    inprogress: allMine.filter(t=>t.status==='inprogress').length,
    done: allMine.filter(t=>t.status==='done').length
  };
  const mine = (wFilter==='all' ? allMine : allMine.filter(t=>t.status===wFilter)).sort((a,b)=> b.createdAt - a.createdAt);

  const vesselChips = renderVesselFilterChips();

/* ---------- Export (M only) — شيت واحد فيه كل الحاويات: رقم الحاوية / البوزيشن / بوزيشن الوصول ---------- */
function exportHistoryCsv(){
  const rows = historyLog.slice().sort((a,b)=> a.createdAt - b.createdAt);
  const header = ['Container Number', 'Vessel', 'Position', 'Position on Arrival', 'Status', 'Shift', 'Data Rejected?', 'Deleted?', 'Created By', 'Started By', 'Created At'];
  const csvEscape = (v)=>{
    const s = v==null ? '' : String(v);
    return '"' + s.replace(/"/g,'""') + '"';
  };
  const statusAr = {waiting:'Waiting', inprogress:'In Progress', done:'Done'};
  const lines = [header.map(csvEscape).join(',')];
  rows.forEach(t=>{
    // عمود الشيفت: اسم الشيفت + تاريخ بدايته بالإنجليزي
    const shiftCol = t.shiftName
      ? `${t.shiftName} (${new Date(t.shiftDateTs).toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'numeric'})})`
      : '';
    lines.push([
      t.container || '',
      t.vessel || '',
      t.position || '',
      t.positionOnArrival || '',
      statusAr[t.status] || t.status || '',
      shiftCol,
      t.hadWrongData ? 'Yes' : 'No',
      t.deleted ? 'Yes' : 'No',
      t.from || '',
      t.startedBy || '',
      fmtTime(t.createdAt)
    ].map(csvEscape).join(','));
  });
  const csvContent = '\uFEFF' + lines.join('\r\n');
  const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'containers-history-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('Sheet exported ✓');
}

/* ---------- Actions ---------- */
// كل تاسك بقى مستند مستقل، فبنكتب/نعدّل المستند بتاعه هو بس مش الليست كلها — ده جوهر التوفير في القراءات
async function startTask(id){
  const t = dWaiting.find(x=>x.id===id);
  if(!t){ toast('This task was updated or deleted by someone else'); return; }
  const input = document.getElementById('poa-'+id);
  const poa = input ? input.value.trim() : '';
  if(!poa){ toast('You must enter Position on Arrival first'); return; }
  const startedAt = Date.now();
  await updateTaskDoc(id, {positionOnArrival: poa, status:'inprogress', startedBy: myId, startedAt});
  await writeHistoryDoc(id, {positionOnArrival: poa, status:'inprogress', startedBy: myId, startedAt});
  toast('Started ✓');
}

async function doneTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t){ toast('This task was updated or deleted by someone else'); return; }
  const doneAt = Date.now();
  await updateTaskDoc(id, {status:'done', doneAt});
  await writeHistoryDoc(id, {status:'done', doneAt});
  toast('Task closed ✓');
}

async function deleteTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t){ toast('This task is already deleted'); return; }
  if(myRole === 'W' && t.from !== myId){ toast('You can only delete your own tasks'); return; }

  await deleteTaskDoc(id);

  toast('Deleted ✓ (still saved in History)');
}

// D بيدوس Wrong Data — بيقرأ الـ checkboxes اللي فوق الزرار على طول (من غير ما يفتح مودال) ويبعت التاسك لـ W يصلح الحقل/الحقول المعلّم عليها بس
async function sendWrongData(id){

async function wrongDataTask(id, wrongFields){

  if(!t){ toast('This task was updated by someone else'); return; }
  const wrongAt = Date.now();
  await updateTaskDoc(id, {wrongData:true, wrongBy: myId, wrongAt, wrongFields});

// W بيستخدمها لما يصلّح الحقل/الحقول اللي D علّم عليها إنها غلط — بترجع التاسك تاني لقائمة Waiting عند D
async function resendTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t){ toast('This task was updated by someone else'); return; }
  // fallback للتاسكات القديمة اللي اترفضت قبل التحديث ده (كانت Position بس دايمًا)
  const fields = (t.wrongFields && t.wrongFields.length) ? t.wrongFields : ['position'];

  const updates = {};
  if(fields.includes('container')){
    const container = (document.getElementById('ec-'+id)?.value || '').trim().toUpperCase();
    if(!container){ toast('You must enter the corrected Container Number'); return; }
    updates.container = container;
  }
  if(fields.includes('position')){
    const position = (document.getElementById('ep-'+id)?.value || '').trim();
    if(!position){ toast('You must enter the corrected Position'); return; }
    updates.position = position;
  }
  updates.wrongData = false; updates.wrongBy = null; updates.wrongAt = null; updates.wrongFields = null;

  await updateTaskDoc(id, updates);
  await writeHistoryDoc(id, updates);
  toast('Fixed — back in D\'s queue ✓');
}

// تصحيح سريع ومباشر لرقم الحاوية (زي إضافة بريفكس ناقص) — D بيعمله بنفسه من غير ما يرجّع التاسك لـ W خالص
// اختياري بالكامل: لو مش محتاج، البروسيس بتكمل عادي زي ما هي
async function fixContainerNumber(id){
  const t = dWaiting.find(x=>x.id===id);
  if(!t){ toast('This task was updated or deleted by someone else'); return; }
  const input = document.getElementById('cc-'+id);

// بيمسح مجموعة تاسكات مرة واحدة (Batch) — بيشيلهم من tasks ويعلّمهم Deleted في history. الـ batch الواحد أقصاه 500 عملية في Firestore فبنقسمهم لو كتار
async function batchDeleteTasks(list){
  const now = Date.now();
  const chunkSize = 200; // كل تاسك بياخد عمليتين (مسح + تعليم في history)، فخلينا هامش أمان تحت حد الـ 500
  for(let i=0; i<list.length; i+=chunkSize){
    const chunk = list.slice(i, i+chunkSize);
    const batch = db.batch();
    chunk.forEach(t=>{
      batch.delete(tasksCol.doc(t.id));
      batch.set(historyCol.doc(t.id), {deleted:true, deletedAt: now, lastStatusBeforeDelete: t.status}, {merge:true});
    });
    try{ await batch.commit(); }
    catch(e){ toast('Some deletions failed — check your internet connection'); return false; }
  }
  return true;
}

// بيمسح كل تاسكات W الحالي المعروضة في الفلتر النشط بس (Waiting/In Progress/Done/All) — البيانات تفضل في الـ History
async function deleteAllTasksInView(filterStatus){
  const labels = {all:'All', waiting:'Waiting', inprogress:'In Progress', done:'Done'};
  const toDelete = tasks.filter(t=> filterStatus==='all' || t.status===filterStatus); // tasks هنا أصلًا مفلترة من Firestore على تاسكات W نفسه بس

  if(!confirm(`Delete all ${toDelete.length} task(s) in "${labels[filterStatus]}"? This can't be undone here (but stays in History).`)) return;
  const ok = await batchDeleteTasks(toDelete);
  if(ok) toast(`Deleted ${toDelete.length} task(s) ✓ (still saved in History)`);
}

// بيجيب كل مستندات الكوليكشن ويمسحهم على دفعات (500 أقصى حد للـ batch الواحد في Firestore)
async function deleteAllDocsInCollection(colRef){
  const snap = await colRef.get();
  const docs = snap.docs;
  for(let i=0; i<docs.length; i+=450){
    const batch = db.batch();
    docs.slice(i, i+450).forEach(d=> batch.delete(d.ref));
    await batch.commit();
  }
}

async function resetDatabase(){
  try{
    await deleteAllDocsInCollection(tasksCol);
    await deleteAllDocsInCollection(historyCol);
    tasks = []; historyLog = []; dWaiting = []; dMyInProgress = [];
    seenCardIds = new Set(); // نبدأ الأنيميشن من الأول تاني بعد المسح
    render();
    toast('Database reset ✓');
  }catch(e){
    toast('Reset failed — check your internet connection');
  }
}

    const crane = document.getElementById('craneInput').value;
    const truck = document.getElementById('tInput').value.trim().toUpperCase();

    if(vessels.length === 0){ toast('No vessel added yet — ask a D user to add one first'); return; }
    const vessel = vessels.length >= 2 ? document.getElementById('vesselInput').value : vessels[0];

    if(!container){ toast('You must enter the Container Number'); return; }
    if(!position){ toast('You must enter the Position'); return; }
    if(!crane){ toast('You must select the Crane number'); return; }
    if(!truck){ toast('You must enter the Truck number'); return; }

    const shiftInfo = getShiftInfoForTimestamp(Date.now());
    // wrongData لازم تتحط false صراحة (مش تتسيب فاضية) عشان كويري D بتفلترها بعد الجيب — لو الفيلد مش موجود أصلاً هيتفلتر برة صح برضه، بس بنبقيها صريحة للوضوح
    const newTaskId = 'tk_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const newTask = {
      id: newTaskId,
      container, position, crane, truck, vessel,
      from: myId,
      positionOnArrival: '',
      startedBy: null,
      status: 'waiting',
      createdAt: Date.now(),
      startedAt: null,
      doneAt: null,
      wrongData: false, wrongBy: null, wrongAt: null, wrongFields: null, hadWrongData: false,
      deleted: false, deletedAt: null, lastStatusBeforeDelete: null,
      shiftName: shiftInfo.name,
      shiftDateTs: shiftInfo.shiftDateTs
    };
    await writeTaskDoc(newTaskId, newTask);
    await writeHistoryDoc(newTaskId, newTask);
    closeModal();
    toast('Task sent ✓');
  };
}

(function init(){
  loadTheme();
  document.getElementById('themeToggle').onclick = toggleTheme;
  renderShiftBadge();
  setInterval(renderShiftBadge, 60000); // يحدّث كل دقيقة عشان يبان صح لحظة تغيّر الشيفت
  loadMyVessel();
  attachVesselsListener();
  loadId(); // بيحدد myId/myRole من الجهاز لو الشخص سجل دخول قبل كده
  if(myId){
    mainArea.innerHTML = `<div class="empty">Connecting to the database...</div>`;
    attachTaskListenersForRole();
  }else{
    render(); // شاشة تسجيل الدخول، مش محتاجة تستنى بيانات
  }
})();
</script>
</body>
